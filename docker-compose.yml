services:
  turacoflow:
    build: .
    container_name: turacoflow
    ports:
      - "8000:8000"
    environment:
      # Point Ollama at the host machine — models run outside the container
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SQLITE_DB_PATH: /data/claims.db
      LANCEDB_PATH: /data/vector_store
      APP_ENV: production
      LOG_LEVEL: INFO
      CONFIDENCE_THRESHOLD: "0.75"
    volumes:
      # Persist the policy index and claim history across container restarts
      - turacoflow_data:/data
      # Cache EasyOCR and sentence-transformer model weights
      - turacoflow_models:/root/.EasyOCR
      - turacoflow_st_cache:/root/.cache/torch/sentence_transformers
    extra_hosts:
      # On Linux, host.docker.internal is not set automatically
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    image: python:3.12-slim
    container_name: turacoflow_ui
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir -r ui/requirements.txt -q &&
               streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      API_URL: http://turacoflow:8000
    volumes:
      - ./ui:/app/ui
    depends_on:
      - turacoflow
    restart: unless-stopped

volumes:
  turacoflow_data:
  turacoflow_models:
  turacoflow_st_cache:
